server:
  port: 2333
  address: 0.0.0.0
  password: ${LAVALINK_SERVER_PASSWORD}

lavalink:
  server:
    sources:
      youtube: false
      soundcloud: true
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
    lyrics-sources:
      lrcLib: true
    spotify:
      clientId: ${SPOTIFY_CLIENT_ID:}
      clientSecret: ${SPOTIFY_CLIENT_SECRET:}
      # NOTE: Spotify playlists do not resolve with a newly-created app — the
      # anonymous-token path is TOTP-protected and returns 401, and client
      # credentials cannot read playlists. A fix requires `customTokenEndpoint`
      # (a fragile external token service) — deferred. Single tracks + search
      # + YouTube (incl. playlists) work. `spDc` (Spotify lyrics) is a separate
      # option for the lyrics feature.
      countryCode: ID

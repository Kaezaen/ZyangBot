services:
  bot:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      LAVALINK_URL: lavalink:2333
    depends_on:
      lavalink:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      # Readiness: /health returns 200 only when both Discord and Lavalink are
      # connected (503 otherwise), so the container is "healthy" only once it can
      # actually serve. wget ships with the alpine (busybox) base image and exits
      # non-zero on a 503.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Cap memory to protect the host from OOM; no CPU cap so playback is not
    # throttled. Rotate logs so stdout cannot fill the disk over time.
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    environment:
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      # application.yml only (read-only). Plugins are NOT mounted on a named
      # volume: the Lavalink image runs as uid 322 but a fresh named volume at
      # /opt/Lavalink/plugins (a path absent from the image) is created
      # root-owned, so Lavalink cannot write the downloaded jars. Letting the
      # container own its plugins dir avoids that; jars re-download on recreate
      # (a few seconds) and persist across restarts.
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    expose:
      - "2333"
    restart: unless-stopped
    healthcheck:
      # Readiness: Lavalink (Spring Boot) only binds port 2333 once the server
      # is up, so a TCP check is a robust "ready to accept clients" signal.
      # Avoids Lavalink's auth-required HTTP endpoints and busybox --header
      # inconsistencies. start_period is generous because the first boot
      # downloads plugins from Maven.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2333 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    # The JVM is memory-hungry; 1g leaves headroom for the bot and OS on a 2 GB
    # host. The JVM is container-aware and sizes its heap from this limit.
    mem_limit: 1g
    mem_reservation: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional monitoring stack. Not started by default (keeps the 2 GB host free);
  # run with:  docker compose --profile observability up -d
  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
  grafana-data:
